# ─────────────────────────────────────────────────────────────
# .github/workflows/deploy.yml  —  API (FastAPI) CD
#
# Trigger:
#   - workflow_run: "Build & Push" 완료 후 자동 실행
#   - workflow_dispatch: 수동 배포
#
# 승인 설정 (필수):
#   GitHub → Repo → Settings → Environments → New environment: "production"
#   → Required reviewers: [teacher-github-username]
#
# Org-level Secrets (자동 상속):
#   DEPLOY_WEBHOOK_TOKEN  ← 배포 웹훅 토큰
#
# Repository Variables (Settings → Secrets and variables → Variables):
#   STUDENT_NAME = alice    ← 반드시 설정!
# ─────────────────────────────────────────────────────────────
name: Deploy to Production

on:
  workflow_run:
    workflows: ["Build & Push"]
    types: [completed]
    branches: [main]

  workflow_dispatch:
    inputs:
      reason:
        description: "배포 사유 (선택)"
        required: false
        type: string

permissions:
  contents: read

env:
  DOMAIN: codingfit.kr
  WEBHOOK_URL: https://admin.codingfit.kr/hook/deploy

jobs:
  # ── 빌드 결과 확인 ─────────────────────────────────────────
  gate:
    name: Check Build
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    outputs:
      proceed: ${{ steps.check.outputs.proceed }}
    steps:
      - name: Check
        id: check
        run: echo "proceed=true" >> $GITHUB_OUTPUT

  # ── 승인 후 배포 ───────────────────────────────────────────
  deploy:
    name: Deploy (선생님 승인 필요)
    runs-on: ubuntu-latest
    needs: gate
    if: needs.gate.outputs.proceed == 'true'
    environment: production

    steps:
      # ── 웹훅으로 배포 트리거 ────────────────────────────────
      - name: Trigger deploy via webhook
        id: deploy
        run: |
          RESPONSE=$(curl -s -w "\n%{http_code}" \
            -X POST \
            -H "Authorization: Bearer ${{ secrets.DEPLOY_WEBHOOK_TOKEN }}" \
            -H "Content-Type: application/json" \
            "${{ env.WEBHOOK_URL }}/${{ vars.STUDENT_NAME }}/api")

          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | head -1)

          echo "HTTP: $HTTP_CODE"
          echo "Body: $BODY"

          if [ "$HTTP_CODE" != "200" ]; then
            echo "❌ 배포 트리거 실패 (HTTP $HTTP_CODE)" >> $GITHUB_STEP_SUMMARY
            echo "$BODY" >> $GITHUB_STEP_SUMMARY
            exit 1
          fi

          echo "✅ 배포 큐 등록 완료" >> $GITHUB_STEP_SUMMARY

      # ── 외부 Health Check ───────────────────────────────────
      - name: External health check
        id: health
        run: |
          URL="https://${{ github.event.repository.name }}.${{ env.DOMAIN }}/health"
          MAX=18; WAIT=10; ATTEMPT=0

          echo "Health check: $URL" | tee -a $GITHUB_STEP_SUMMARY
          echo "배포 완료까지 최대 $((MAX * WAIT))초 대기..."

          while [ $ATTEMPT -lt $MAX ]; do
            ATTEMPT=$((ATTEMPT + 1))
            sleep $WAIT
            HTTP=$(curl -s -o /dev/null -w "%{http_code}" \
              --max-time 15 --connect-timeout 10 "$URL" 2>/dev/null || echo "000")

            if [ "$HTTP" = "200" ]; then
              echo "✅ HTTP $HTTP (시도 $ATTEMPT/${MAX})" | tee -a $GITHUB_STEP_SUMMARY
              exit 0
            fi

            echo "시도 $ATTEMPT/${MAX}: HTTP $HTTP — 재시도..."
          done

          echo "❌ Health check 실패 (${MAX}회 초과)" | tee -a $GITHUB_STEP_SUMMARY
          exit 1

      # ── 성공 요약 ─────────────────────────────────────────
      - name: Success summary
        if: success()
        run: |
          {
            echo "## ✅ 배포 성공"
            echo "| 항목 | 값 |"
            echo "|---|---|"
            echo "| Student | \`${{ vars.STUDENT_NAME }}\` |"
            echo "| Service | api |"
            echo "| URL | https://${{ github.event.repository.name }}.${{ env.DOMAIN }}/health |"
            echo "| 배포 시각 | $(date -u +%Y-%m-%dT%H:%M:%SZ) |"
            echo "| 배포자 | @${{ github.actor }} |"
            echo "| 사유 | ${{ github.event.inputs.reason || 'main merge' }} |"
          } >> $GITHUB_STEP_SUMMARY
