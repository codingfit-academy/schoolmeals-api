# ─────────────────────────────────────────────────────────────
# .github/workflows/build.yml  —  API (FastAPI) CI
# ─────────────────────────────────────────────────────────────
name: Build & Push

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  REGISTRY: ghcr.io
  ORG: codingfit-academy

jobs:
  lint-test:
    name: Lint & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install -r requirements-dev.txt 2>/dev/null || true
          # 최소 테스트 도구
          pip install pytest httpx ruff 2>/dev/null || true

      - name: Lint (ruff)
        run: ruff check . --select=E,F,W --ignore=E501 2>/dev/null || true

      - name: Test
        run: pytest --tb=short -q 2>/dev/null || echo "테스트 없음 또는 건너뜀"

  docker-build:
    name: Docker Build${{ github.event_name != 'pull_request' && ' & Push' || '' }}
    runs-on: ubuntu-latest
    needs: lint-test
    outputs:
      sha_tag: ${{ steps.sha.outputs.tag }}

    steps:
      - uses: actions/checkout@v4

      - name: Short SHA
        id: sha
        run: echo "tag=sha-$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.ORG }}/${{ github.event.repository.name }}
          tags: |
            type=sha,prefix=sha-,format=short
            type=raw,value=stable,enable=${{ github.event_name != 'pull_request' }}
          labels: |
            academy.student=${{ vars.STUDENT_NAME }}
            academy.service=api
            academy.api-type=fastapi

      - name: Build and push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false

      - name: Summary
        if: github.event_name != 'pull_request'
        run: |
          {
            echo "## ✅ FastAPI Build & Push 완료"
            echo "- Image: \`${{ env.REGISTRY }}/${{ env.ORG }}/${{ github.event.repository.name }}\`"
            echo "- Tag: \`${{ steps.sha.outputs.tag }}\`"
            echo "- API Type: FastAPI"
          } >> $GITHUB_STEP_SUMMARY
